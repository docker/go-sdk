name: Release

on:
  # Phase 1: Manual trigger to prepare a release PR
  workflow_dispatch:
    inputs:
      module:
        description: 'Module to release (leave empty for all modules)'
        required: false
        default: ''
        type: string
      bump_type:
        description: 'Type of version bump to perform'
        required: false
        default: 'prerelease'
        type: choice
        options:
          - prerelease
          - patch
          - minor
          - major
      dry_run:
        description: 'Perform a dry run without creating a PR'
        required: false
        default: true
        type: boolean

  # Phase 2: Auto-tag when version.go files change on main (after PR merge)
  push:
    branches:
      - main
    paths:
      - '*/version.go'

jobs:
  # Phase 1: Prepare release PR (or dry run preview)
  prepare-release:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        fetch-depth: 0  # Fetch all history and tags
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Go
      uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
      with:
        go-version-file: 'go.work'

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Display run configuration
      run: |
        echo "🚀 Release Configuration:"
        echo "  - Module: ${{ inputs.module || 'all' }}"
        echo "  - Dry Run: ${{ inputs.dry_run }}"
        echo "  - Bump Type: ${{ inputs.bump_type }}"
        echo "  - Repository: ${{ github.repository }}"
        echo "  - Branch: ${{ github.ref_name }}"

    - name: Validate module
      if: ${{ inputs.module != '' }}
      run: |
        AVAILABLE_MODULES=$(go work edit -json | jq -r '.Use[].DiskPath' | sed 's|^\./||')
        if ! echo "$AVAILABLE_MODULES" | grep -q "^${{ inputs.module }}$"; then
          echo "❌ Error: Module '${{ inputs.module }}' not found in go.work"
          echo ""
          echo "Available modules:"
          echo "$AVAILABLE_MODULES" | sed 's/^/  - /'
          exit 1
        fi
        echo "✅ Module '${{ inputs.module }}' is valid"

    - name: Dry run preview
      if: ${{ inputs.dry_run }}
      env:
        DRY_RUN: "true"
        BUMP_TYPE: ${{ inputs.bump_type }}
      run: |
        echo "=== Dry Run Preview ==="
        if [[ -n "${{ inputs.module }}" ]]; then
          ./.github/scripts/pre-release.sh "${{ inputs.module }}"
        else
          make pre-release-all
        fi
        echo ""
        echo "✅ Dry run completed. No changes were made."
        echo "To create a release PR, re-run with dry_run: false"

    - name: Prepare release PR
      if: ${{ !inputs.dry_run }}
      env:
        BUMP_TYPE: ${{ inputs.bump_type }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if [[ -n "${{ inputs.module }}" ]]; then
          ./.github/scripts/prepare-release-pr.sh "${{ inputs.module }}"
        else
          ./.github/scripts/prepare-release-pr.sh
        fi

  # Phase 2: Auto-tag after release PR is merged
  tag-release:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        fetch-depth: 0  # Fetch all history and tags
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Verify commit is a release
      id: check
      run: |
        COMMIT_MSG=$(git log -1 --pretty=%B)
        echo "Commit message:"
        echo "${COMMIT_MSG}"
        echo ""
        # Only proceed if the commit message matches the release pattern
        # produced by prepare-release-pr.sh: "chore(release): bump module versions"
        # or "chore(<module>): bump version"
        # We check the full message (%B = subject + body) so this works for:
        #   - Squash merge: PR title is the subject line
        #   - Regular merge: PR title appears in the body
        #   - Rebase merge: original commit message is preserved
        if echo "$COMMIT_MSG" | grep -qE '^chore\((release|[a-z]+)\): bump (module )?version'; then
          echo "✅ Commit matches release pattern — proceeding with tagging"
          echo "is_release=true" >> "$GITHUB_OUTPUT"
        else
          echo "⏭️ Commit does not match release pattern — skipping tagging"
          echo "is_release=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Configure Git
      if: steps.check.outputs.is_release == 'true'
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Create tags and trigger Go proxy
      if: steps.check.outputs.is_release == 'true'
      env:
        DRY_RUN: "false"
      run: |
        echo "=== Phase 2: Auto-tagging after PR merge ==="
        ./.github/scripts/tag-release.sh
